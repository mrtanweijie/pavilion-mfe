<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8" /><title>PavilionMfe Segment Main</title><script>
// React Refresh preamble — required because React segments load as
// Module Federation remotes (no own HTML), so their @vitejs/plugin-react
// transforms need these globals available in the main-app context.
window.$RefreshReg$ = function() {};
window.$RefreshSig$ = function() { return function(type) { return type; }; };
window.__vite_plugin_react_preamble_installed__ = true;
</script></head>
<body>
<div id="app"></div>
<script>
// GitHub Pages SPA fallback: 404.html → sessionStorage → 恢复路径
(function() {
  var redirect = sessionStorage.getItem('pavilion-redirect');
  if (redirect) {
    sessionStorage.removeItem('pavilion-redirect');
    history.replaceState(null, '', redirect);
  }
})();
</script>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
